# Bundle minor/patch Cargo updates into a single weekly PR to reduce review churn.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        update-types:
          - "minor"
          - "patch"
