syntax = "proto3";

package bb_core;

option optimize_for = LITE_RUNTIME;

import "onnx-ml.proto";

/* --------------------- Distance --------------------- */

message DistanceProto {
    enum DataType {
        UNDEFINED = 0;
        FLOAT = 1;
        UINT8 = 2;
        INT8 = 3;
        UINT16 = 4;
        INT16 = 5;
        INT32 = 6;
        INT64 = 7;
        STRING = 8;
        BOOL = 9;
        FLOAT16 = 10;
        DOUBLE = 11;
        UINT32 = 12;
        UINT64 = 13;
        COMPLEX64 = 14;
        COMPLEX128 = 15;
        BFLOAT16 = 16;
        FLOAT8E4M3FN = 17;
        FLOAT8E4M3FNUZ = 18;
        FLOAT8E5M2 = 19;
        FLOAT8E5M2FNUZ = 20;
        UINT4 = 21;
        INT4 = 22;
        FLOAT4E2M1 = 23;
        FLOAT8E8M0 = 24;
    }

    int32 data_type = 1;
    repeated float float_data = 2 [packed = true];
    repeated int32 int32_data = 3 [packed = true];
    repeated bytes string_data = 6;
    repeated int64 int64_data = 7 [packed = true];
}

/* --------------------- Peer --------------------- */

message PeerProto {
    bytes peer_id = 1;
    repeated string addresses = 2;
}
